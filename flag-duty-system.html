<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>仪仗队升降旗自动排班系统 · 电脑端</title>
<style>
:root{
  --bg: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
  --card-bg: rgba(22,27,34,0.6);
  --card-border: rgba(255,255,255,0.06);
  --primary: #C62828;
  --primary-glow: #FF1744;
  --accent: #B71C1C;
  --navy: #0a1628;
  --gold: #D4AF37;
  --gold-light: #F0D060;
  --text: #e6e6e6;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --border-glass: rgba(255,255,255,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.05) inset;
  --radius: 16px;
  --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: #0d1117;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(180,0,0,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(10,22,40,0.8) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

nav{
  width: 280px;
  background: linear-gradient(195deg, #0d1b2a 0%, #09121c 40%, #060d15 100%);
  color: #fff;
  padding: 0;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 4px 0 40px rgba(0,0,0,0.5), 1px 0 0 rgba(255,255,255,0.03);
  position: relative;
  z-index: 10;
}
nav::after{
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(212,175,55,0.3), transparent);
}
nav .emblem{
  text-align: center;
  padding: 48px 24px 28px;
  position: relative;
}
nav .emblem::after{
  content: '';
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
}
nav .emblem img{
  width: 96px;
  height: 96px;
  border-radius: 50%;
  border: 3px solid rgba(212,175,55,0.25);
  object-fit: cover;
  background: rgba(255,255,255,0.03);
  box-shadow: 0 0 40px rgba(180,0,0,0.15), 0 0 80px rgba(212,175,55,0.06);
  transition: transform 0.3s, box-shadow 0.3s;
}
nav .emblem img:hover{
  transform: scale(1.05);
  box-shadow: 0 0 60px rgba(180,0,0,0.25), 0 0 120px rgba(212,175,55,0.1);
}
nav h1{
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  padding: 0 28px 24px;
  letter-spacing: 6px;
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(212,175,55,0.2);
}
nav a{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px 32px;
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.25s ease;
  text-decoration: none;
  font-weight: 500;
  position: relative;
}
nav a:hover{
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.85);
  border-left-color: rgba(212,175,55,0.3);
}
nav a.sel{
  background: linear-gradient(90deg, rgba(198,40,40,0.12) 0%, rgba(198,40,40,0.02) 100%);
  border-left-color: var(--primary-glow);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 0 20px rgba(198,40,40,0.1) inset;
}
nav .foot{
  padding: 28px;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  margin-top: auto;
  letter-spacing: 1px;
}
nav .foot::before{
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 0 auto 16px;
}

main{
  flex: 1;
  padding: 48px 56px;
  overflow-y: auto;
  max-height: 100vh;
}
main::-webkit-scrollbar{width:6px}
main::-webkit-scrollbar-track{background:transparent}
main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

h2{
  font-size: 28px;
  margin-bottom: 32px;
  color: #fff;
  font-weight: 800;
  letter-spacing: 1px;
  position: relative;
  padding-bottom: 16px;
}
h2::after{
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--primary-glow), var(--gold));
  border-radius: 2px;
}

.card{
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.3s;
}
.card:hover{border-color: rgba(255,255,255,0.1)}
.card h3{
  font-size: 16px;
  margin-bottom: 20px;
  color: #e6e6e6;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

table{
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th,td{
  padding: 12px 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
  vertical-align: middle;
}
th{
  background: rgba(255,255,255,0.04);
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 12px;
  white-space: nowrap;
  letter-spacing: 1px;
  text-transform: uppercase;
}
tr:hover td{background: rgba(255,255,255,0.02)}

.btn{
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}
.btn::after{
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}
.btn-r{background: linear-gradient(135deg, #C62828, #B71C1C); color: #fff; box-shadow: 0 4px 16px rgba(198,40,40,0.3);}
.btn-r:hover{background: linear-gradient(135deg, #D32F2F, #C62828); box-shadow: 0 6px 24px rgba(198,40,40,0.45); transform: translateY(-1px);}
.btn-b{background: linear-gradient(135deg, #1a2a4a, #0d1b3e); color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3);}
.btn-b:hover{background: linear-gradient(135deg, #1f3460, #152550); box-shadow: 0 6px 24px rgba(0,0,0,0.45); transform: translateY(-1px);}
.btn-o{background: transparent; color: #fff; border: 2px solid rgba(198,40,40,0.4);}
.btn-o:hover{background: rgba(198,40,40,0.1); border-color: var(--primary-glow); box-shadow: 0 0 20px rgba(198,40,40,0.15);}
.btn-g{background: transparent; border: 1.5px solid rgba(255,255,255,0.12); color: var(--text-secondary);}
.btn-g:hover{background: rgba(255,255,255,0.04); color: #fff; border-color: rgba(255,255,255,0.2);}
.btn-xs{padding: 5px 14px; font-size: 12px; border-radius: 6px;}

input,select{
  padding: 10px 16px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  width: 100%;
  background: rgba(0,0,0,0.3);
  color: #e6e6e6;
  transition: all 0.25s ease;
}
input:focus,select:focus{
  outline: none;
  border-color: rgba(198,40,40,0.4);
  box-shadow: 0 0 0 3px rgba(198,40,40,0.1), 0 0 20px rgba(198,40,40,0.05);
}
input::placeholder{color: rgba(255,255,255,0.2)}
select option{background: #161b22; color: #e6e6e6}

label{
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:120px}

.badge{
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  display: inline-block;
  letter-spacing: 0.5px;
}
.badge-on{background: rgba(46,160,67,0.15); color: #3fb950; border: 1px solid rgba(46,160,67,0.2)}
.badge-off{background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.2)}

.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal{
  background: #1a1f2e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 36px;
  min-width: 480px;
  max-width: 94vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 32px 96px rgba(0,0,0,0.5);
}
.modal h4{margin-bottom: 24px; font-size: 20px; color: #fff; font-weight: 700;}
.modal-actions{display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px;}

.toast{
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 16px 36px;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  z-index: 9999;
  animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(16px);
}
.toast-ok{background: rgba(46,160,67,0.9); box-shadow: 0 8px 32px rgba(46,160,67,0.3); border: 1px solid rgba(46,160,67,0.3)}
.toast-err{background: rgba(198,40,40,0.9); box-shadow: 0 8px 32px rgba(198,40,40,0.35); border: 1px solid rgba(255,23,68,0.3)}
.toast-info{background: rgba(13,27,42,0.95); box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1)}
@keyframes toastIn{from{transform: translateX(120%); opacity: 0}to{transform: translateX(0); opacity: 1}}

.empty{
  text-align: center;
  padding: 64px 48px;
  color: var(--text-muted);
  font-size: 14px;
}

.sched-chip{
  display: inline-block;
  padding: 4px 12px;
  margin: 2px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
  font-weight: 500;
}
.sched-chip.gr{background: rgba(255,100,100,0.12); color: #ff7070; border: 1px solid rgba(255,100,100,0.15)}
.sched-chip.ra{background: rgba(255,180,100,0.12); color: #ffb470; border: 1px solid rgba(255,180,100,0.15)}
.sched-chip.lo{background: rgba(100,160,255,0.12); color: #70a0ff; border: 1px solid rgba(100,160,255,0.15)}
.sched-chip.ep{color: rgba(255,255,255,0.2); font-style: italic}

.sched-table td{min-width: 100px; vertical-align: top; padding: 10px 12px}
.sched-table td.hd{background: rgba(255,255,255,0.04); font-weight: 600; font-size: 12px; color: var(--text-secondary)}
.sched-table td.rl{font-weight: 600; text-align: left; background: rgba(255,255,255,0.02); font-size: 13px; min-width: 70px; color: var(--text-secondary)}
.sched-table td.off{background: rgba(255,0,0,0.05)}

@media print{
  nav,.btn,.modal-overlay,.mobile-hint{display:none!important}
  main{max-height:none; overflow:visible; padding:0}
  .card{box-shadow:none; border:1px solid #ddd; background:#fff; color:#333}
  body{background:#fff}
  th,td{color:#333; border-color:#ddd}
  h2{color:#333}
  h2::after{background:#333}
}

.cell{
  width: 32px; height: 32px; font-size: 12px;
  transition: all 0.2s ease; cursor: pointer; user-select: none;
  border-radius: 4px;
}
.cell.busy{background: linear-gradient(135deg, #C62828, #8B0000); color: #fff; box-shadow: 0 2px 8px rgba(198,40,40,0.3)}
.cell.free{background: rgba(46,160,67,0.15); color: #3fb950}
.cell:hover{opacity: 0.8; transform: scale(1.1)}

.bar{
  display: inline-block;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--primary-glow), var(--gold));
  vertical-align: middle;
  margin-left: 4px;
  box-shadow: 0 0 8px rgba(212,175,55,0.3);
}

.mobile-hint{
  display: none;
  background: rgba(212,175,55,0.1);
  color: var(--gold-light);
  padding: 10px 20px;
  text-align: center;
  font-size: 13px;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}
.mobile-hint a{color: var(--gold-light); font-weight: 600}

@media(max-width:768px){
  .mobile-hint{display:block}
  nav{display:none}
  body{flex-direction:column; align-items:center; justify-content:center; padding:20px}
  main{display:flex; align-items:center; justify-content:center; max-height:none; padding:0}
  main>*{text-align:center}
}


</style>
</head>

// Auto-migrate: merge 24级 into stored members if missing
(()=>{
  const stored=L('members',null);
  const defs=L('members_default',[]);
  if(stored&&defs.length&&!stored.some(m=>(m.cohort||'')==='24级')){
    const ids=new Set(stored.map(m=>m.id));
    const fresh=defs.filter(m=>!ids.has(m.id));
    if(fresh.length){members=stored.concat(fresh);S('members',members);}
  }
})();
// Normalize: members without cohort → 25级, without height → ''
// Also sync heights and sched from default data for existing members
(()=>{
  const defs=L('members_default',[]);
  if(!defs.length)return;
  const hmap={};const smap={};defs.forEach(m=>{if(m.height)hmap[m.name]=m.height;if(m.sched)smap[m.name]=m.sched;});
  let dirty=false;
  members.forEach(m=>{
    if(!m.cohort){m.cohort='25级';dirty=true;}
    if(m.height===undefined&&hmap[m.name]){m.height=hmap[m.name];dirty=true;}
    if(m.height===undefined){m.height='';dirty=true;}
    if(smap[m.name]){m.sched=smap[m.name];dirty=true;}
  });
  if(dirty)S('members',members);
})();
function recoCounts(){
  counts={};
  countsExLia={};
  for(const e of schedule){
    for(const type of['gr','ra','lo']){
      const roles=type==='gr'?config.grandRaise.roles:type==='ra'?config.raise.roles:config.lower.roles;
      const arr=e[type]||[];
      roles.forEach((r,ri)=>{
        const ids=arr[ri]||[];
        ids.forEach(id=>{
          counts[id]=(counts[id]||0)+1;
          if(!r.name.includes('跟旗'))countsExLia[id]=(countsExLia[id]||0)+1;
        });
      });
    }
  }
}
recoCounts();

// ── 工具 ──
function toast(msg,cls='toast-info'){
  const t=document.createElement('div');t.className='toast '+cls;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function mn(id){const m=members.find(x=>x.id===id);return m?m.name:'—'}
function gm(id){return members.find(x=>x.id===id)}
function countsLia(id){
  // Count 跟旗 only
  let n=0;
  for(const e of schedule){
    const roles=config.lower.roles;
    for(const obj of roles){
      if(!obj.name.includes('跟旗'))continue;
      const ri=roles.indexOf(obj);
      if(((e.lo||[])[ri]||[]).includes(id))n++;
    }
  }
  return n;
}

function lowerPeriods(){
  // 只检查第8节(17:15-18:00)，第8节有课就不能降旗
  return [8];
}

function hasClass(m,sd,periods){
  if(!m.sched||!m.sched[sd])return false;
  return periods.some(p=>m.sched[sd][p]);
}

function recentDuty(id,dateStr){
  const r=config.minRest;if(r<=0)return false;
  const t=new Date(dateStr);
  for(let i=1;i<=r;i++){
    const c=new Date(t);c.setDate(c.getDate()-i);
    const cs=c.toISOString().slice(0,10);
    const e=schedule.find(x=>x.date===cs);
    if(e&&[...(e.gr||[]).flat(),...(e.ra||[]).flat(),...(e.lo||[]).flat()].includes(id))return true;
  }
  return false;
}

// ── 日期类型 ──
function dayTypes(sd){
  // 0=Mon .. 5=Sun
  return{
    gr:sd===0,                           // Mon:大升旗
    ra:sd>=1&&sd<=4,                     // Tue-Fri:升旗
    lo:sd<=3||sd===5,                    // Mon-Thu+Sun:降旗
  };
}

// ── 分配角色 ──
let weekSpecial={}; // week-level dedup for flag bearer/commander/liaison
function assign(roles,pool,run,quotas){
  quotas=quotas||{};
  const res=roles.map(()=>[]);
  const used=new Set();
  function eligiblePool(roleName){
    const isSpecial=roleName.includes('旗手')||roleName.includes('指挥')||roleName.includes('跟旗');
    // For special roles, allow run[id]==3 if necessary to guarantee daily coverage
    let p=pool.filter(id=>!used.has(id)&&(run[id]||0)<(isSpecial?config.maxPerWeek+1:config.maxPerWeek));
    if(roleName.includes('旗手'))p=p.filter(id=>{const m=gm(id);return m&&(m.tags||[]).includes('旗手')});
    if(roleName.includes('指挥'))p=p.filter(id=>{const m=gm(id);return m&&(m.tags||[]).includes('指挥')});
    if(roleName.includes('跟旗'))p=p.filter(id=>{const m=gm(id);return m&&(m.tags||[]).includes('联勤')});
    // Prefer people not yet used in this special role this week
    const cnt=id=>roleName.includes('跟旗')?(counts[id]||0):(countsExLia[id]||0);
    const sorted=[...p].sort((a,b)=>{
      const ca=cnt(a),cb=cnt(b);
      const pa=ca<3?0:1,pb=cb<3?0:1;
      // For special roles, prioritize people not yet used in that role this week
      if(isSpecial){
        const wa=weekSpecial[roleName]&&weekSpecial[roleName].has(a)?1:0;
        const wb=weekSpecial[roleName]&&weekSpecial[roleName].has(b)?1:0;
        return wa-wb||pa-pb||ca-cb;
      }
      return pa-pb||ca-cb;
    });
    const buckets=[];
    let prev=null,cur=[];
    for(const id of sorted){
      const c=cnt(id);
      if(prev!==null&&c!==prev){buckets.push(cur);cur=[];}
      cur.push(id);
      prev=c;
    }
    if(cur.length)buckets.push(cur);
    return buckets.map(b=>b.sort(()=>Math.random()-.5)).flat();
  }
  function pick(eligible,target,opts={}){
    const res=[];
    const {cohort,gender}=opts;
    for(const id of eligible){
      if(res.length>=target)break;
      if(used.has(id))continue;
      if((run[id]||0)>=config.maxPerWeek)continue;
      const m=gm(id);
      if(cohort&&m&&(m.cohort||'')!==cohort)continue;
      if(gender&&m&&m.gender!==gender)continue;
      res.push(id);used.add(id);
    }
    return res;
  }
  var qkeys=[['24级男','24级','男'],['24级女','24级','女'],['25级男','25级','男'],['25级女','25级','女']];
  var hasQuota=function(){for(var i=0;i<qkeys.length;i++){if((quotas[qkeys[i][0]]||0)>0)return true;}return false;}();
  var isSpecial=function(name){return name.includes('旗手')||name.includes('指挥')||name.includes('跟旗');};
  for(let ri=0;ri<roles.length;ri++){
    const rname=roles[ri].name;
    const eligible=eligiblePool(rname);
    res[ri]=[];
    // Special roles (旗手/指挥/跟旗): pick freely, quotas don't apply
    if(isSpecial(rname)||!hasQuota){
      for(const id of eligible){
        if(res[ri].length>=roles[ri].count)break;
        if(used.has(id))continue;
        if((run[id]||0)>=config.maxPerWeek)continue;
        res[ri].push(id);used.add(id);
      }
    }else{
      var picked=0;
      for(var qi=0;qi<qkeys.length;qi++){
        var qk=qkeys[qi][0], qc=qkeys[qi][1], qg=qkeys[qi][2];
        var need=quotas[qk]||0;
        if(need<=0)continue;
        var sel=pick(eligible,need,{cohort:qc,gender:qg});
        for(var si=0;si<sel.length;si++){res[ri].push(sel[si]);picked++;}
      }
      var remain=roles[ri].count-picked;
      if(remain>0){
        for(var ei=0;ei<eligible.length;ei++){
          if(res[ri].length>=roles[ri].count)break;
          var id=eligible[ei];
          if(used.has(id))continue;
          if((run[id]||0)>=config.maxPerWeek)continue;
          res[ri].push(id);used.add(id);
        }
      }
    }
  }
  res.flat().forEach(id=>{run[id]=(run[id]||0)+1});
  function hnum(id){const m=gm(id);return m&&m.height?parseFloat(m.height)||0:0}
  for(let ri=0;ri<roles.length;ri++){
    if(roles[ri].name.includes('旗手')&&res[ri].length===3){
      const hts=res[ri].map(id=>({id,h:hnum(id)}));
      hts.sort((a,b)=>a.h-b.h);
      res[ri]=[hts[0].id, hts[2].id, hts[1].id];
    }
  }
  // Track special roles used this week for cross-day dedup
  for(let ri=0;ri<roles.length;ri++){
    const rname=roles[ri].name;
    if(rname.includes('旗手')||rname.includes('指挥')||rname.includes('跟旗')){
      if(!weekSpecial[rname])weekSpecial[rname]=new Set();
      res[ri].forEach(id=>weekSpecial[rname].add(id));
    }
  }
  return res;
}
// ── 生成一周 ──
function genWeek(mondayStr,quotas){
  quotas=quotas||{};
  const result=[];
  const run={};
  const start=new Date(mondayStr);
  for(let d=0;d<7;d++){
    const dt=new Date(start);dt.setDate(dt.getDate()+d);
    const ds=dt.toISOString().slice(0,10);
    const jsd=dt.getDay();if(jsd===6)continue;
    const sd=JS_SD[jsd];
    const locked=schedule.find(x=>x.date===ds&&x.locked);
    if(locked){result.push({...locked});continue;}
    const dtp=dayTypes(sd);
    const entry={date:ds,sd,gr:[],ra:[],lo:[]};
    const active=members.filter(m=>m.status==='active').map(m=>m.id);
    if(dtp.gr)entry.gr=assign(config.grandRaise.roles,active,run,quotas.gr||{});
    if(dtp.ra)entry.ra=assign(config.raise.roles,active,run,quotas.ra||{});
    if(dtp.lo){
      const lp=lowerPeriods();
      const elig=active.filter(id=>!hasClass(gm(id),sd,lp));
      const excl=[...(entry.gr||[]).flat(),...(entry.ra||[]).flat()];
      entry.lo=assign(config.lower.roles,elig.filter(id=>!excl.includes(id)),run,quotas.lo||{});
    }
    result.push(entry);
  }
  return result;
}

function doSchedule(){
  const start=document.getElementById('sched-monday').value;
  const weeks=parseInt(document.getElementById('sched-weeks').value);
  if(!start)return toast('请选择日期','toast-err');
  if(!members.some(m=>m.status==='active'))return toast('没有在岗队员','toast-err');
  // Read quotas from UI
  var q=function(type,i){var v=parseInt(document.getElementById('q-'+type+'-'+i).value);return v||0;};
  var quotas={};
  ['gr','ra','lo'].forEach(function(t){
    quotas[t]={'24级男':q(t,0),'24级女':q(t,1),'25级男':q(t,2),'25级女':q(t,3)};
  });
  for(let w=0;w<weeks;w++){
    // Remove old auto-generated entries for this week first
    const ws=new Date(start);ws.setDate(ws.getDate()+w*7);
    const wMonday=ws.toISOString().slice(0,10);
    for(let d=0;d<7;d++){
      const dt=new Date(ws);dt.setDate(dt.getDate()+d);
      const ds=dt.toISOString().slice(0,10);
      const ei=schedule.findIndex(x=>x.date===ds);
      if(ei>=0&&!schedule[ei].locked)schedule.splice(ei,1);
    }
    const entries=genWeek(wMonday,quotas);
    for(const e of entries){
      const ei=schedule.findIndex(x=>x.date===e.date);
      if(ei>=0&&!schedule[ei].locked)schedule[ei]=e;
      else if(ei<0)schedule.push(e);
    }
    // Update counts incrementally so next week sees current balance
    recoCounts();
  }
  schedule.sort((a,b)=>a.date.localeCompare(b.date));
  recoCounts();
  S('schedule',schedule);S('counts',counts);
  pageSchedule();toast('排班已生成','toast-ok');
}
function clearSched(){if(!confirm('确定清空所有排班？'))return;schedule=[];recoCounts();S('schedule',schedule);pageSchedule();toast('已清空','toast-info')}

function renderSched(){
  if(!schedule.length)return'<div class="card"><div class="empty">暂无排班数据</div></div>';
  const sorted=[...schedule].sort((a,b)=>a.date.localeCompare(b.date));
  const weeks=[];let cur=[];
  for(const s of sorted){cur.push(s);if(cur.length===6||s===sorted[sorted.length-1]){weeks.push(cur);cur=[]}}

  return weeks.map((w,i)=>{
    const label=`${w[0].date} ~ ${w[w.length-1].date}`;
    const hasGR=w.some(e=>(e.gr||[]).flat().length>0);
    const hasRA=w.some(e=>(e.ra||[]).flat().length>0);
    const hasLO=w.some(e=>(e.lo||[]).flat().length>0);

    const ids=new Set();
    w.forEach(e=>{[(e.gr||[]),(e.ra||[]),(e.lo||[])].flat(2).forEach(id=>ids.add(id))});
    const wm=[...ids].map(id=>gm(id)).filter(Boolean).sort((a,b)=>(countsExLia[b.id]||0)-(countsExLia[a.id]||0));

    function rrows(roles,type,cls){
      return roles.map((r,ri)=>`
        <tr><td class="rl">${r.name}<br><small style="color:var(--muted);font-weight:normal">${r.count}人</small></td>
        ${w.map(e=>{
          const ids_=(e[type]||[])[ri]||[];
          const names=ids_.map(id=>{let x='';if(type==='lo'){const lp=lowerPeriods();const m_=gm(id);if(m_&&hasClass(m_,e.sd,lp))x=' &#9888;'}return esc(mn(id))+x});
          return`<td onclick="swapCell('${e.date}','${type}',${ri})" title="点击调整">${names.length?names.map(n=>`<span class="sched-chip ${cls}">${n}</span>`).join(''):'<span class="sched-chip ep">—</span>'}</td>`;
        }).join('')}</tr>`).join('');
    }

    return`<div class="card"><h3>&#128197; 第${i+1}周 ${label}</h3>
      <div style="display:flex;gap:20px">
        <div style="flex:1;overflow-x:auto">
          <table class="sched-table"><thead><tr><th style="width:60px">类型</th>
            ${w.map(e=>`<th class="hd">${e.date.slice(5)}<br>${WEEKDAYS[e.sd]||''}</th>`).join('')}</tr></thead>
          <tbody>
            ${hasGR?`<tr><td colspan="${w.length+1}" style="background:#fff5f5;font-weight:bold;text-align:left;padding:8px 10px;font-size:13px">&#127937; 大升旗 (${config.grandRaise.time})</td></tr>${rrows(config.grandRaise.roles,'gr','gr')}`:''}
            ${hasRA?`<tr><td colspan="${w.length+1}" style="background:#fffaf5;font-weight:bold;text-align:left;padding:8px 10px;font-size:13px">&#127464;&#127475; 升旗 (${config.raise.time})</td></tr>${rrows(config.raise.roles,'ra','ra')}`:''}
            ${hasLO?`<tr><td colspan="${w.length+1}" style="background:#f0f4ff;font-weight:bold;text-align:left;padding:8px 10px;font-size:13px">&#127753; 降旗 (${config.lower.time})</td></tr>${rrows(config.lower.roles,'lo','lo')}`:''}
          </tbody></table>
        </div>
        <div style="width:160px;flex-shrink:0;border-left:1px solid var(--border);padding-left:16px">
          <div style="font-size:14px;font-weight:bold;margin-bottom:8px;color:#555">本周出勤</div>
          ${wm.map(m=>{const n=countsExLia[m.id]||0;const nx=Math.max(...wm.map(x=>countsExLia[x.id]||0),1);const bw=Math.round(n/nx*60);return`<div style="font-size:13px;padding:3px 0;display:flex;align-items:center;justify-content:space-between"><span>${esc(m.name)}</span><span style="color:var(--primary-light);font-weight:bold">${n}<span class="bar" style="width:${bw}px"></span></span></div>`}).join('')}
          ${!wm.length?'<div style="font-size:13px;color:var(--muted)">暂无</div>':''}
        </div></div></div>`;
  }).join('');
}

function swapCell(dateStr,type,ri){
  const e=schedule.find(x=>x.date===dateStr);if(!e)return;
  if(e.locked)return toast('该日已锁定','toast-info');
  const roles=type==='gr'?config.grandRaise.roles:type==='ra'?config.raise.roles:config.lower.roles;
  const role=roles[ri];
  const curIds=(e[type]||[])[ri]||[];
  const active=members.filter(m=>m.status==='active');
  const lp=lowerPeriods();
  const tmap={gr:'大升旗',ra:'升旗',lo:'降旗'};

  let elig=active;
  if(type==='lo'){elig=active.filter(m=>!hasClass(m,e.sd,lp));if(!elig.length)return toast('无课队员不足','toast-err')}

  const dayIds=new Set();[(e.gr||[]),(e.ra||[]),(e.lo||[])].flat(2).forEach(id=>dayIds.add(id));
  curIds.forEach(id=>dayIds.delete(id));

  // Build search + tag filter + sort controls
  const filterBar=`
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <input id="swap-search" placeholder="搜索姓名..." style="padding:5px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;width:140px">
      <label><input type="checkbox" id="swap-tag-bearer" ${selTags[0]?'checked':''}> 旗手</label>
      <label><input type="checkbox" id="swap-tag-cmd" ${selTags[1]?'checked':''}> 指挥</label>
      <label><input type="checkbox" id="swap-tag-lia" ${selTags[2]?'checked':''}> 联勤</label>
      <span style="font-size:11px;color:var(--muted)">(勾选=只看有该标签的)</span>
    </div>`;

  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal" style="min-width:500px">
    <h4>调整 ${tmap[type]} — ${role.name} (需${role.count}人) — ${dateStr}</h4>
    ${filterBar}
    <div style="max-height:340px;overflow-y:auto" id="swap-list">${elig.map(m=>{
      const chk=curIds.includes(m.id);const cf=type==='lo'&&hasClass(m,e.sd,lp);const or=dayIds.has(m.id);
      return`<label class="swap-row" style="display:flex;align-items:center;gap:8px;padding:7px;border-radius:6px;cursor:pointer;${chk?'background:#fef0f0':''};${or?'opacity:.45':''}" onmouseover="this.style.background='${chk?'#fef0f0':'#f5f5f5'}'" onmouseout="this.style.background='${chk?'#fef0f0':''}'" data-name="${esc(m.name)}" data-tags="${(m.tags||[]).join(',')}">
        <input type="checkbox" value="${m.id}" ${chk?'checked':''} ${or?'disabled':''} style="width:auto">
        <span>${esc(m.name)}</span>${(m.tags||[]).length?`<span style="font-size:10px">${m.tags.map(t=>`<span class="badge badge-on" style="margin:1px">${t}</span>`).join('')}</span>`:''}<span style="font-size:11px;color:var(--muted)">${esc(m.cls||'')}·${counts[m.id]||0}次</span>
        ${cf?'<span style="color:var(--primary-light);font-size:11px">&#9888;有课</span>':''}${or?'<span style="color:var(--muted);font-size:11px">已分配</span>':''}
      </label>`}).join('')}</div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">已选 <span id="cnt">${curIds.length}</span>/${role.count}</div>
    <div class="modal-actions">
      <button class="btn btn-g" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="btn btn-r" id="swap-save">保存</button>
    </div></div>`;
  document.body.appendChild(ov);

  // search & tag filter logic
  function filterSwapList(){
    const q=(document.getElementById('swap-search')?.value||'').toLowerCase();
    const wantBearer=document.getElementById('swap-tag-bearer')?.checked;
    const wantCmd=document.getElementById('swap-tag-cmd')?.checked;
    const wantLia=document.getElementById('swap-tag-lia')?.checked;
    const anyTag=wantBearer||wantCmd||wantLia;
    document.querySelectorAll('.swap-row').forEach(row=>{
      const name=row.dataset.name.toLowerCase();
      const tags=row.dataset.tags||'';
      const nameOk=!q||name.includes(q);
      let tagOk=true;
      if(anyTag){
        tagOk=false;
        if(wantBearer&&tags.includes('旗手'))tagOk=true;
        if(wantCmd&&tags.includes('指挥'))tagOk=true;
        if(wantLia&&tags.includes('联勤'))tagOk=true;
      }
      row.style.display=nameOk&&tagOk?'':'none';
    });
  }

  const ss=document.getElementById('swap-search');
  if(ss)ss.addEventListener('input',filterSwapList);
  ['swap-tag-bearer','swap-tag-cmd','swap-tag-lia'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.addEventListener('change',filterSwapList);
  });

  ov.querySelectorAll('input[type=checkbox]').forEach(cb=>{if(!cb.parentElement.classList.contains('swap-row'))return;cb.addEventListener('change',()=>{
    const chk=ov.querySelectorAll('input[type=checkbox]:checked');
    ov.querySelector('#cnt').textContent=chk.length;
    if(chk.length>role.count){cb.checked=false;toast('最多'+role.count+'人','toast-err');ov.querySelector('#cnt').textContent=ov.querySelectorAll('input[type=checkbox]:checked').length}
  })});
  ov.querySelector('#swap-save').onclick=()=>{
    const sel=[...ov.querySelectorAll('input[type=checkbox]:checked')].map(cb=>cb.value);
    if(sel.length<role.count)return toast('需选'+role.count+'人','toast-err');
    if(!e[type])e[type]=[];e[type][ri]=sel;
    recoCounts();S('schedule',schedule);ov.remove();pageSchedule();toast('已调整','toast-ok');
  };
  ov.addEventListener('click',ev=>{if(ev.target===ov)ov.remove()});
}

// ═══════════════════════════════════════
// 值班统计
// ═══════════════════════════════════════
function pageStats(){
  const sorted=[...members].sort((a,b)=>(countsExLia[b.id]||0)-(countsExLia[a.id]||0));
  const totalExLia=Object.values(countsExLia).reduce((s,v)=>s+v,0);
  const mx=Math.max(...Object.values(countsExLia),1);
  const recent=[...schedule].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  const tmap={gr:'大升旗',ra:'升旗',lo:'降旗'};
  document.getElementById('main').innerHTML=h2c('&#128202; 值班统计')+`
    <div class="card"><h3>全队累计 <span style="font-weight:normal;font-size:14px;color:var(--muted)">${totalExLia}人次（不含跟旗）</span></h3>
      ${sorted.length?`<table><thead><tr><th>排名</th><th>姓名</th><th>班级</th><th>升降旗</th><th>跟旗</th><th>占比</th><th>状态</th></tr></thead><tbody>
        ${sorted.map((m,i)=>`
          <tr><td>${i+1}</td><td><strong>${esc(m.name)}</strong></td><td>${esc(m.cls||'')}</td>
          <td><strong>${countsExLia[m.id]||0}</strong></td>
          <td>${countsLia(m.id)}</td>
          <td><span class="bar" style="width:${Math.round((countsExLia[m.id]||0)/mx*70)}px;height:6px"></span> ${totalExLia?Math.round((countsExLia[m.id]||0)/totalExLia*100):0}%</td>
          <td><span class="badge ${m.status==='active'?'badge-on':'badge-off'}">${m.status==='active'?'在岗':'请假'}</span></td></tr>`).join('')}
      </tbody></table>`:'<div class="empty">暂无数据</div>'}
    </div>
    <div class="card"><h3>最近记录</h3>
      ${recent.length?`<table><thead><tr><th>日期</th><th>大升旗</th><th>升旗</th><th>降旗</th></tr></thead><tbody>
        ${recent.map(e=>`<tr><td>${e.date}<br><small>${WEEKDAYS[e.sd]||''}</small></td>
          <td style="text-align:left;font-size:13px">${(e.gr||[]).flatMap(ids=>ids.map(id=>mn(id))).filter(Boolean).join('、')||'—'}</td>
          <td style="text-align:left;font-size:13px">${(e.ra||[]).flatMap(ids=>ids.map(id=>mn(id))).filter(Boolean).join('、')||'—'}</td>
          <td style="text-align:left;font-size:13px">${(e.lo||[]).flatMap(ids=>ids.map(id=>mn(id))).filter(Boolean).join('、')||'—'}</td></tr>`).join('')}
      </tbody></table>`:'<div class="empty">暂无数据</div>'}
    </div>`;
}

function exportExcel(){
  if(!schedule.length)return toast('暂无排班数据','toast-err');
  const sorted=[...schedule].sort((a,b)=>a.date.localeCompare(b.date));

  const CONFIG={gr:config.grandRaise,ra:config.raise,lo:config.lower};
  const DAYS=['周一','周二','周三','周四','周五','周日'];

  // CSV escape
  function csv(s){if(s==null||s==='')return '';if(s.includes(',')||s.includes('"')||s.includes('\n'))return '"'+s.replace(/"/g,'""')+'"';return s;}

  const weeks=[];let cw=[];
  for(const s of sorted){cw.push(s);if(cw.length===6||s===sorted[sorted.length-1]){weeks.push(cw);cw=[]}}

  // Build 2D grid: rows array of 23-element arrays (cols A-W = 0..22)
  const rows=[];

  weeks.forEach((w,wi)=>{
    if(wi>0)rows.push(new Array(23).fill('')); // spacer

    // Week header row: A = week label
    const wl=`第${wi+1}周 ${w[0].date} ~ ${w[w.length-1].date}`;
    const whRow=new Array(23).fill('');
    whRow[0]=wl; rows.push(whRow);

    // Day header row
    const dhRow=new Array(23).fill('');
    DAYS.forEach((d,i)=>{dhRow[i<=4?i+1:7]=d;});
    dhRow[20]='姓名'; dhRow[21]='次数';
    rows.push(dhRow);
    const dayHdrIdx=rows.length-1;

    // Section blocks
    ['gr','ra','lo'].forEach(type=>{
      const roles=CONFIG[type].roles;
      const any=w.some(e=>{const a=e[type]||[];return a.some(x=>(x||[]).length>0);});
      if(!any)return;

      // Section title row
      const tl=(type==='gr'?'大升旗':type==='ra'?'升旗':'降旗')+' ('+CONFIG[type].time+')';
      const secRow=new Array(23).fill('');
      secRow[0]=tl; secRow[1]=tl; secRow[2]=tl; secRow[3]=tl; secRow[4]=tl; secRow[5]=tl; secRow[7]=tl;
      rows.push(secRow);

      // Role rows
      roles.forEach((role,ri)=>{
        const roleRow=new Array(23).fill('');
        roleRow[0]=role.name+'('+role.count+'人)';
        for(let sd=0;sd<=5;sd++){
          const e=w.find(x=>x.sd===sd);
          const ids=e&&(e[type]||[])[ri]||[];
          const names=ids.map(id=>mn(id)).join('、')||'—';
          roleRow[sd<=4?sd+1:7]=names;
        }
        rows.push(roleRow);
      });
    });

    // Sidebar member list (spans from day header row downward)
    const allIds=new Set();
    w.forEach(e=>{['gr','ra','lo'].forEach(t=>{(e[t]||[]).forEach(a=>{(a||[]).forEach(id=>{if(id)allIds.add(id);})})})});
    const wm=[...allIds].map(id=>gm(id)).filter(Boolean).sort((a,b)=>(countsExLia[b.id]||0)-(countsExLia[a.id]||0));
    wm.forEach((m,mi)=>{
      const rowIdx=dayHdrIdx+1+mi;
      while(rows.length<=rowIdx)rows.push(new Array(23).fill(''));
      rows[rowIdx][20]=m.name;
      // recount from grid
      let cnt=0;
      for(let r=0;r<rows.length;r++){
        for(let c=0;c<=11;c++){
          const v=rows[r][c];
          if(v&&v.includes(m.name))cnt++;
        }
      }
      rows[rowIdx][21]=String(cnt);
    });
  });

  // Serialize to CSV
  let csvText='﻿'; // BOM for Excel UTF-8
  for(const row of rows){
    csvText+=row.map(csv).join(',')+'\n';
  }

  const blob=new Blob([csvText],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.style.display='none';
  a.download='排班表_'+(new Date(sorted[0].date)).toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),200);
  toast('已导出CSV','toast-ok');
}
document.querySelectorAll('nav a').forEach(a=>{
  a.addEventListener('click',()=>{
    document.querySelectorAll('nav a').forEach(x=>x.classList.remove('sel'));a.classList.add('sel');
    const p=a.dataset.page;
    if(p==='members')pageMembers();else if(p==='config')pageConfig();else if(p==='schedule')pageSchedule();else if(p==='stats')pageStats();
  });
});

// ── 初始化 ──
pageMembers();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
